<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DFW Signal LLC</title>
<link rel="icon" type="image/svg+xml" href="dfw-signal-logo.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#fff;color:#111;font-family:'Inter',sans-serif;overflow:hidden;}

/* full page layout */
.page{
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;padding:40px;
  opacity:0;animation:fadein 0.6s ease 0.1s forwards;
}

@keyframes fadein{to{opacity:1;}}

/* top bar */
.topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:28px 40px;
}
.topbar-logo{font-size:14px;font-weight:600;color:#111;letter-spacing:-0.01em;}
.topbar-tag{font-size:12px;color:#aaa;font-weight:400;}

/* center content */
.center{text-align:center;display:flex;flex-direction:column;align-items:center;}

.eyebrow{
  font-size:11px;font-weight:600;color:#bbb;
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:32px;
  opacity:0;animation:riseup 0.6s ease 0.5s forwards;
}

.wordmark{
  font-family:'Playfair Display',serif;
  font-size:clamp(64px,12vw,140px);
  font-weight:400;line-height:1;
  letter-spacing:-0.03em;
  color:#111;
  margin-bottom:8px;
  opacity:0;animation:riseup 0.7s ease 0.65s forwards;
}

.wordmark-sub{
  font-family:'Playfair Display',serif;
  font-size:clamp(20px,4vw,44px);
  font-weight:400;font-style:italic;
  color:#aaa;letter-spacing:-0.01em;
  margin-bottom:56px;
  opacity:0;animation:riseup 0.7s ease 0.8s forwards;
}

/* divider arrow */
.divider{
  display:flex;flex-direction:column;align-items:center;gap:0;
  margin-bottom:32px;
  opacity:0;animation:fadein 0.5s ease 1.1s forwards;
}
.divider-line{
  width:1px;height:0;background:#ddd;
  animation:growline 0.5s ease 1.1s forwards;
}
@keyframes growline{to{height:40px;}}
.divider-arrow{
  font-size:14px;color:#ccc;line-height:1;margin-top:2px;
  transition:color 0.2s,transform 0.2s;
}

/* enter button */
.enter-btn{
  display:inline-flex;flex-direction:column;align-items:center;gap:0;
  text-decoration:none;cursor:pointer;
  opacity:0;animation:riseup 0.6s ease 1.3s forwards;
}
.enter-btn:hover .divider-arrow{color:#111;transform:translateY(3px);}
.enter-label{
  font-size:13px;font-weight:700;color:#111;
  letter-spacing:0.14em;text-transform:uppercase;
  transition:opacity 0.2s;
}
.enter-btn:hover .enter-label{opacity:0.6;}

/* bottom bar */
.bottombar{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 40px;
  opacity:0;animation:fadein 0.6s ease 1.5s forwards;
}
.bottombar-left{font-size:11px;color:#ccc;letter-spacing:0.04em;}
.bottombar-right{font-size:11px;color:#ccc;letter-spacing:0.04em;}

/* thin horizontal rule across page */
.rule{
  position:absolute;left:40px;right:40px;height:1px;background:#f0f0f0;
  top:72px;
  opacity:0;animation:fadein 0.5s ease 0.4s forwards;
}
.rule-bottom{top:auto;bottom:64px;}

@keyframes riseup{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

/* page exit */
body.out .page{animation:fadeout 0.45s ease forwards;}
@keyframes fadeout{to{opacity:0;}}

@media(max-width:600px){
  .topbar{padding:20px;}
  .topbar-tag{display:none;}
  .bottombar{padding:16px 20px;}
  .page{padding:20px;}
  .rule{left:20px;right:20px;}
  .wordmark{font-size:clamp(56px,16vw,100px);}
}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="rule"></div>
  <div class="rule rule-bottom"></div>

  <div class="topbar">
    <span class="topbar-logo">DFW Signal</span>
    <span class="topbar-tag">Digital Infrastructure System</span>
  </div>

  <div class="center">
    <p class="eyebrow">Built for service businesses</p>
    <h1 class="wordmark">Signal.</h1>
    <p class="wordmark-sub">More jobs. Nothing missed.</p>
    <a class="enter-btn" href="home.html" onclick="go(event)">
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-arrow">↓</span>
      </div>
      <span class="enter-label">Enter</span>
    </a>
  </div>

  <div class="bottombar">
    <span class="bottombar-left">DFW Signal LLC · Dallas, TX</span>
    <span class="bottombar-right">dfwsignal.ai</span>
  </div>
</div>

<script>
function go(e){
  e.preventDefault();
  document.body.classList.add('out');
  setTimeout(function(){window.location.href='home.html';},460);
}
</script>
</body>
</html>
