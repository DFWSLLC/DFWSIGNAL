<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DFW Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#000;}

    /* Room flash overlay — white blast that fades */
    #flash{
      position:fixed;inset:0;z-index:50;
      background:#fff;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.06s ease;
    }

    /* Grain — CSS SVG filter, zero JS overhead */
    #grain{position:fixed;inset:0;z-index:1;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='gr'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23gr)' opacity='1'/%3E%3C/svg%3E");
      background-size:180px 180px;mix-blend-mode:overlay;opacity:0.55;
      animation:grainShift 0.08s steps(1) infinite;
    }
    @keyframes grainShift{
      0%{background-position:0 0;}10%{background-position:-15px 5px;}20%{background-position:10px -8px;}
      30%{background-position:-8px 12px;}40%{background-position:5px -5px;}50%{background-position:-12px 8px;}
      60%{background-position:8px -12px;}70%{background-position:-5px 6px;}80%{background-position:12px -4px;}
      90%{background-position:-6px -8px;}100%{background-position:0 0;}
    }

    /* SVG lightning layer */
    #svg-layer{position:fixed;inset:0;z-index:2;pointer-events:none;}

    /* Ambient light canvas — the room glow when lightning fires */
    #ambient{position:fixed;inset:0;z-index:3;pointer-events:none;mix-blend-mode:screen;}

    .cur{position:fixed;pointer-events:none;z-index:999;width:28px;height:28px;transform:translate(-50%,-50%);}
    .cur::before,.cur::after{content:'';position:absolute;background:rgba(255,255,255,0.45);}
    .cur::before{width:1px;height:100%;left:50%;transform:translateX(-50%);}
    .cur::after{width:100%;height:1px;top:50%;transform:translateY(-50%);}

    .corner{position:fixed;width:16px;height:16px;z-index:20;}
    .corner.tl{top:20px;left:20px;border-top:1px solid rgba(255,255,255,0.08);border-left:1px solid rgba(255,255,255,0.08);}
    .corner.tr{top:20px;right:20px;border-top:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08);}
    .corner.bl{bottom:20px;left:20px;border-bottom:1px solid rgba(255,255,255,0.08);border-left:1px solid rgba(255,255,255,0.08);}
    .corner.br{bottom:20px;right:20px;border-bottom:1px solid rgba(255,255,255,0.08);border-right:1px solid rgba(255,255,255,0.08);}

    .meta{position:fixed;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.14em;color:rgba(255,255,255,0.55);z-index:20;line-height:1.9;opacity:0;animation:fi 1s 7s forwards;}
    .meta.tl{top:24px;left:42px;}
    .meta.br{top:24px;right:42px;text-align:right;}

    /* UI sits above everything */
    .ui{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;}

    .wordmark{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(80px,14vw,190px);
      letter-spacing:0.06em;color:#fff;line-height:1;
      opacity:0;transition:opacity 0.5s;
      display:flex;align-items:baseline;
      text-shadow:0 0 60px rgba(255,255,255,0.1);
    }

    .type-cursor{
      display:inline-block;width:3px;height:0.78em;
      background:#fff;vertical-align:baseline;
      margin-right:1px;flex-shrink:0;
      animation:blink 0.6s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    .divider{width:0;height:1px;background:rgba(255,255,255,0.25);margin:18px 0;transition:width 0.9s ease;}
    .divider.on{width:clamp(200px,30vw,400px);}

    .sub{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.22em;color:#ffffff;margin-bottom:52px;opacity:0;transition:opacity 0.7s;}
    .sub.on{opacity:1;}

    .enter{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.22em;color:#ffffff;text-decoration:none;opacity:0;transition:opacity 0.6s,color 0.3s;display:flex;align-items:center;gap:18px;}
    .enter.on{opacity:1;}
    .enter:hover{color:rgba(255,255,255,1.0);letter-spacing:0.36em;}
    .enter:hover .vline{background:rgba(255,255,255,0.45);}
    .vline{width:1px;height:22px;background:rgba(255,255,255,0.18);transition:background 0.3s;flex-shrink:0;}
    .enter-word{letter-spacing:0.28em;}

    .btm{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.16em;color:rgba(255,255,255,0.55);z-index:20;white-space:nowrap;opacity:0;animation:fi 1s 7s forwards;}

    @keyframes fi{to{opacity:1;}}
    body.out{animation:bye 0.5s forwards;}
    @keyframes bye{to{opacity:0;}}

    
      .sub{font-size:16px;letter-spacing:0.18em;margin-bottom:36px;}
      .enter{font-size:17px;}
      .meta{font-size:9px;}
      .btm{font-size:9px;letter-spacing:0.1em;white-space:normal;text-align:center;width:90%;left:5%;transform:none;}
      .meta.br{top:16px;right:16px;text-align:right;}
      .meta.tl{left:16px;}
      .corner{width:12px;height:12px;}
    }

    @media(max-width:600px){
      .wordmark{font-size:clamp(48px,16vw,90px);}
      .sub{font-size:15px;letter-spacing:0.16em;margin-bottom:32px;}
      .enter{font-size:16px;}
      .meta.tl{font-size:9px;top:16px;left:16px;}

      .corner{width:10px;height:10px;}
      /* Bottom tag — single line, smaller */
      .btm{font-size:8px;letter-spacing:0.1em;white-space:nowrap;bottom:16px;
           left:50%;transform:translateX(-50%);width:auto;}
    }
  </style>

  <!-- SVG filter for electric distortion effect -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="electric" x="-20%" y="-20%" width="140%" height="140%">
        <!-- Turbulence distorts the line into fractal shape -->
        <feTurbulence id="turb" type="turbulence" baseFrequency="0.035 0.7" numOctaves="4" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
        <!-- Blur for atmospheric glow -->
        <feGaussianBlur in="displaced" stdDeviation="3.5" result="glow"/>
        <feComposite in="displaced" in2="glow" operator="over"/>
      </filter>

      <filter id="electric-core" x="-5%" y="-50%" width="110%" height="200%">
        <feTurbulence id="turb2" type="turbulence" baseFrequency="0.04 0.9" numOctaves="5" seed="8" result="noise2"/>
        <feDisplacementMap in="SourceGraphic" in2="noise2" scale="8" xChannelSelector="R" yChannelSelector="G" result="disp2"/>
        <feGaussianBlur in="disp2" stdDeviation="1" result="coreblur"/>
        <feComposite in="disp2" in2="coreblur" operator="over"/>
      </filter>

      <filter id="glow-only" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="8" result="bigblur"/>
        <feComposite in="bigblur" in2="SourceGraphic" operator="over"/>
      </filter>
    </defs>
  </svg>
</head>
<body>
  <div id="flash"></div>
  <div id="grain"></div>
  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
  <canvas id="ambient"></canvas>

  <div class="cur" id="cur"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="meta tl">DFW SIGNAL LLC<br>V.01 / ACTIVE</div>
  <div class="meta br">32.7767°N 97.2904°W<br>DALLAS · TEXAS</div>


  <div class="ui">
    <div class="wordmark" id="wm"></div>
    <div class="divider" id="dv"></div>
    <div class="sub" id="sb">AI BUSINESS SOLUTIONS</div>
    <a class="enter" id="en" href="home.html" onclick="go(event)">
      <div class="vline"></div>
      <span class="enter-word">Enter</span>
      <div class="vline"></div>
    </a>
  </div>

  <div class="btm">DFW SIGNAL LLC · DALLAS, TX · AI BUSINESS SOLUTIONS</div>

  <script>
    var cur=document.getElementById('cur');
    document.addEventListener('mousemove',function(e){cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

    var W=window.innerWidth, H=window.innerHeight;
    var cx=W/2, cy=H/2;

    // ── GRAIN ──

    // ── AMBIENT LIGHT (room flash) ──
    var aCanvas=document.getElementById('ambient');
    var aCtx=aCanvas.getContext('2d');
    aCanvas.width=W; aCanvas.height=H;
    var ambientOp=0;
    var ambientTarget=0;

    function drawAmbient(){
      aCtx.clearRect(0,0,W,H);
      ambientOp+=(ambientTarget-ambientOp)*0.18;
      if(ambientOp>0.003){
        // Radial glow from top-center where lightning originates
        var g=aCtx.createRadialGradient(cx,0,0,cx,H*0.3,H*0.7);
        g.addColorStop(0,'rgba(255,255,255,'+ambientOp+')');
        g.addColorStop(0.4,'rgba(255,255,220,'+(ambientOp*0.3)+')');
        g.addColorStop(1,'rgba(0,0,0,0)');
        aCtx.fillStyle=g;
        aCtx.fillRect(0,0,W,H);
      }
      requestAnimationFrame(drawAmbient);
    }
    drawAmbient();

    // ── FLASH OVERLAY ──
    var flashEl=document.getElementById('flash');
    function triggerFlash(intensity){
      flashEl.style.transition='opacity 0.04s ease';
      flashEl.style.opacity=intensity;
      setTimeout(function(){
        flashEl.style.transition='opacity '+(0.08+Math.random()*0.15)+'s ease';
        flashEl.style.opacity=0;
      },40+Math.random()*60);
    }

    // ── SVG LIGHTNING ──
    var svg=document.getElementById('svg-layer');
    svg.setAttribute('width',W);
    svg.setAttribute('height',H);
    svg.setAttribute('viewBox','0 0 '+W+' '+H);

    // Fractal midpoint displacement for realistic bolt path
    function boltPoints(x0,y0,x1,y1,rough,depth){
      if(depth<=0) return [[x0,y0],[x1,y1]];
      var mx=(x0+x1)/2+(Math.random()-0.5)*rough;
      var my=(y0+y1)/2+(Math.random()-0.5)*rough*0.4;
      var left=boltPoints(x0,y0,mx,my,rough*0.55,depth-1);
      var right=boltPoints(mx,my,x1,y1,rough*0.55,depth-1);
      return left.concat(right.slice(1));
    }

    function pointsToD(pts){
      return pts.map(function(p,i){ return (i===0?'M':'L')+p[0].toFixed(1)+' '+p[1].toFixed(1); }).join(' ');
    }

    // Bolt group — contains glow, mid, core layers
    var boltGroup=document.createElementNS('http://www.w3.org/2000/svg','g');
    svg.appendChild(boltGroup);

    // Active bolts
    var activeBolts=[];
    var lightningRunning=true;

    function makeBoltEl(pts, opacity, strokeW, filterId){
      var p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d', pointsToD(pts));
      p.setAttribute('stroke','white');
      p.setAttribute('stroke-width', strokeW);
      p.setAttribute('fill','none');
      p.setAttribute('opacity', opacity);
      if(filterId) p.setAttribute('filter','url(#'+filterId+')');
      p.setAttribute('stroke-linecap','butt');
      return p;
    }

    function spawnBolt(){
      if(!lightningRunning) return;

      // Origin — full width of top edge, not just center-weighted
      var startX = Math.random()*W*0.9 + W*0.05;
      var startY = Math.random()*(-20) - 5;

      // End point — large variance, can reach well below center
      var driftX = (Math.random()-0.5)*W*0.55;
      var endX   = Math.max(20, Math.min(W-20, startX + driftX));
      var endY   = H*(0.25 + Math.random()*0.65);

      // Roughness varies wildly — some bolts are tight, some chaotic
      var rough = W*(0.025 + Math.random()*0.08);
      // Depth varies — more depth = more fractal detail
      var depth = 6 + Math.floor(Math.random()*3);
      var mainPts = boltPoints(startX, startY, endX, endY, rough, depth);

      // Core width varies — thin hair bolts to fat trunk bolts
      var coreW = 0.7 + Math.random()*1.8;
      var glowW = coreW*12 + Math.random()*10;

      var g=document.createElementNS('http://www.w3.org/2000/svg','g');

      // Use shared static filters — no per-bolt filter creation
      var fId = 'electric';
      var fId2 = 'electric-core';

      // Glow
      var glow=makeBoltEl(mainPts, 0.1+Math.random()*0.1, glowW, 'glow-only');
      g.appendChild(glow);
      // Electric mid
      var mid=makeBoltEl(mainPts, 0.5+Math.random()*0.3, coreW*3, fId);
      g.appendChild(mid);
      // Core
      var core=makeBoltEl(mainPts, 0.9+Math.random()*0.1, coreW, fId2);
      g.appendChild(core);

      // Branch count varies a lot
      var branchCount = 2+Math.floor(Math.random()*6);
      for(var b=0;b<branchCount;b++){
        var idx=Math.floor(mainPts.length*0.1)+Math.floor(Math.random()*mainPts.length*0.7);
        if(idx>=mainPts.length) idx=mainPts.length-2;
        var bp=mainPts[idx];
        // Branch direction — some go left, some right, some nearly horizontal
        var bLen=40+Math.random()*150;
        var bAng=(Math.random()-0.5)*Math.PI*0.8;
        // Occasionally near-horizontal branch
        if(Math.random()>0.75) bAng=(Math.random()-0.5)*Math.PI*0.15 + (Math.random()>0.5?0.3:-0.3);
        var bex=bp[0]+Math.cos(bAng)*bLen;
        var bey=bp[1]+Math.sin(bAng)*bLen+bLen*0.4;
        var bRough=bLen*(0.2+Math.random()*0.3);
        var bDepth=3+Math.floor(Math.random()*3);
        var bPts=boltPoints(bp[0],bp[1],bex,bey,bRough,bDepth);

        var bop=0.35+Math.random()*0.35;
        var bglow=makeBoltEl(bPts,bop*0.12,coreW*8,'glow-only');
        var bmid=makeBoltEl(bPts,bop*0.7,coreW*2,fId);
        var bcore=makeBoltEl(bPts,bop,coreW*0.65,fId2);
        g.appendChild(bglow);g.appendChild(bmid);g.appendChild(bcore);

        // Tertiary sub-branches — random count
        var tCount=Math.floor(Math.random()*3);
        for(var t=0;t<tCount;t++){
          if(bPts.length<3) continue;
          var tidx=1+Math.floor(Math.random()*(bPts.length-2));
          var tp=bPts[tidx];
          var tLen=15+Math.random()*60;
          var tAng=bAng+(Math.random()-0.5)*1.5;
          var tex=tp[0]+Math.cos(tAng)*tLen;
          var tey=tp[1]+Math.sin(tAng)*tLen+tLen*0.3;
          var tPts=boltPoints(tp[0],tp[1],tex,tey,tLen*0.25,3);
          var tc=makeBoltEl(tPts,0.35+Math.random()*0.3,coreW*0.45,fId2);
          g.appendChild(tc);
        }
      }

      boltGroup.appendChild(g);

      // Clean up unique filters after bolt dies to avoid memory buildup
      var bolt={
        el:g,
        born:Date.now(),
        life: 80+Math.random()*140,
        flickerCount:0,
        maxFlickers:1+Math.floor(Math.random()*4)
      };
      activeBolts.push(bolt);

      // Bolt lifetime — appears, flickers, disappears
      var bolt={
        el:g,
        opacity:1,
        born:Date.now(),
        // How long this bolt stays visible before flickering out
        life: 80+Math.random()*120,
        flickerCount:0,
        maxFlickers:2+Math.floor(Math.random()*3)
      };
      activeBolts.push(bolt);

      // Trigger room flash
      ambientTarget=0.12+Math.random()*0.15;
      triggerFlash(0.04+Math.random()*0.06);

      // Animate the bolt — flicker then remove
      animateBolt(bolt);
    }

    function animateBolt(bolt){
      // Flash on
      bolt.el.style.opacity=1;

      function flicker(){
        if(!document.body.contains(bolt.el)) return;
        if(bolt.flickerCount>=bolt.maxFlickers){
          // Final fade out
          bolt.el.style.transition='opacity 0.05s';
          bolt.el.style.opacity=0;
          ambientTarget=0;
          setTimeout(function(){
            if(bolt.el.parentNode) bolt.el.parentNode.removeChild(bolt.el);

            activeBolts=activeBolts.filter(function(b){return b!==bolt;});
          },80);
          return;
        }

        // Flicker sequence
        bolt.flickerCount++;
        var seq=[1,0.2,1,0,0.8,0];
        var delay=0;
        seq.forEach(function(op,i){
          setTimeout(function(){
            if(bolt.el && document.body.contains(bolt.el)){
              bolt.el.style.opacity=op;
              if(op>0.5){
                ambientTarget=0.06+Math.random()*0.08;
                if(Math.random()>0.6) triggerFlash(0.02+Math.random()*0.04);
              } else {
                ambientTarget*=0.3;
              }
            }
          }, delay);
          delay+=30+Math.random()*40;
        });

        setTimeout(flicker, delay+bolt.life);
      }

      setTimeout(flicker, bolt.life);
    }



    // Natural storm rhythm — clusters, silences, lone strikes
    function stormCycle(){
      if(!lightningRunning) return;

      // Roll what kind of event happens next
      var roll = Math.random();

      if(roll < 0.30){
        // Cluster — 2 to 4 bolts rapid fire
        var count = 2 + Math.floor(Math.random()*3);
        var delay = 0;
        for(var i=0;i<count;i++){
          (function(d){ setTimeout(function(){ if(lightningRunning) spawnBolt(); }, d); })(delay);
          delay += 60 + Math.random()*180;
        }
        // Next event after cluster + silence
        setTimeout(stormCycle, delay + 800 + Math.random()*1400);

      } else if(roll < 0.55){
        // Single lone strike
        spawnBolt();
        // Long silence after
        setTimeout(stormCycle, 1200 + Math.random()*2200);

      } else if(roll < 0.72){
        // Double strike close together
        spawnBolt();
        setTimeout(function(){ if(lightningRunning) spawnBolt(); }, 80+Math.random()*150);
        setTimeout(stormCycle, 900 + Math.random()*1600);

      } else {
        // Pure silence — nothing, just darkness
        setTimeout(stormCycle, 1600 + Math.random()*2800);
      }
    }

    // Opening burst to establish the storm
    spawnBolt();
    setTimeout(spawnBolt, 120);
    setTimeout(spawnBolt, 300);
    setTimeout(stormCycle, 800);

    // Start typewriter after initial storm — lightning continues through and after
    setTimeout(startTypewriter, 3000);

    // ── TYPEWRITER ──
    function startTypewriter(){
      var el=document.getElementById('wm');
      el.style.opacity='1';
      var text='THE SIGNAL';
      var i=0;
      var cursor=document.createElement('span');
      cursor.className='type-cursor';
      el.appendChild(cursor);
      var textNode=document.createElement('span');
      el.insertBefore(textNode,cursor);
      function type(){
        if(i<text.length){
          textNode.textContent+=text[i];i++;
          var d=70+Math.random()*60;
          if(text[i-1]===' ')d+=80;
          if(Math.random()<0.12)d+=130;
          setTimeout(type,d);
        } else {
          setTimeout(function(){cursor.remove();showUI();},700);
        }
      }
      type();
    }

    function showUI(){
      setTimeout(function(){document.getElementById('dv').classList.add('on');},100);
      setTimeout(function(){document.getElementById('sb').classList.add('on');},500);
      setTimeout(function(){document.getElementById('en').classList.add('on');},900);
      // Lightning becomes very sparse after text appears
      // stormCycle handles its own timing, just extend silences
      // by replacing the cycle with a slower one
      lightningRunning=true; // keep running but rarer
    }

    function go(e){
      e.preventDefault();
      lightningRunning=false;
      document.body.classList.add('out');
      setTimeout(function(){window.location.href='home.html';},500);
    }
  </script>
</body>
</html>
