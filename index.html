<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DFW Signal</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;overflow:hidden;cursor:none;background:#080808;}

    /* scanlines */
    body::after{
      content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
    }

    /* vignette */
    body::before{
      content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
      background:radial-gradient(ellipse at center,transparent 35%,rgba(8,8,8,0.88) 100%);
    }

    /* cursor */
    .cur{position:fixed;pointer-events:none;z-index:999;width:16px;height:16px;transform:translate(-50%,-50%);}
    .cur::before,.cur::after{content:'';position:absolute;background:rgba(255,255,255,0.4);}
    .cur::before{width:1px;height:100%;left:50%;transform:translateX(-50%);}
    .cur::after{width:100%;height:1px;top:50%;transform:translateY(-50%);}

    /* ── HUD — desktop ── */
    .hud{
      position:fixed;z-index:20;
      font-family:'Share Tech Mono',monospace;font-size:9px;
      letter-spacing:0.14em;text-transform:uppercase;
      color:rgba(232,232,232,0.22);line-height:2;
      opacity:0;transition:opacity 0.9s ease;
    }
    .hud.tl{top:24px;left:28px;padding:6px 0 0 8px;}
    .hud.tr{top:24px;right:28px;text-align:right;padding:6px 8px 0 0;}
    .hud.bl{bottom:24px;left:28px;padding:0 0 6px 8px;}
    .hud.br{bottom:24px;right:28px;text-align:right;padding:0 8px 6px 0;}

    .hud.tl::before{content:'';position:absolute;top:0;left:0;width:0;height:0;border-top:1px solid rgba(232,232,232,0.25);border-left:1px solid rgba(232,232,232,0.25);transition:width 0.35s ease,height 0.35s ease;}
    .hud.tr::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-top:1px solid rgba(232,232,232,0.25);border-right:1px solid rgba(232,232,232,0.25);transition:width 0.35s ease,height 0.35s ease;}
    .hud.bl::after{content:'';position:absolute;bottom:0;left:0;width:0;height:0;border-bottom:1px solid rgba(232,232,232,0.25);border-left:1px solid rgba(232,232,232,0.25);transition:width 0.35s ease,height 0.35s ease;}
    .hud.br::after{content:'';position:absolute;bottom:0;right:0;width:0;height:0;border-bottom:1px solid rgba(232,232,232,0.25);border-right:1px solid rgba(232,232,232,0.25);transition:width 0.35s ease,height 0.35s ease;}
    .hud.lit::before,.hud.lit::after{width:12px;height:12px;}
    .hud.lit{opacity:1;}

    /* ── MOBILE HUD — replaces corner layout ── */
    /* top coords — centered */
    .mob-top{
      display:none;
      position:fixed;top:20px;left:0;right:0;
      z-index:20;text-align:center;
      font-family:'Share Tech Mono',monospace;font-size:9px;
      letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(232,232,232,0.22);
      opacity:0;transition:opacity 0.9s ease;
    }
    .mob-top.lit{opacity:1;}

    /* bottom left: Dallas TX */
    .mob-bl{
      display:none;
      position:fixed;bottom:24px;left:20px;
      z-index:20;
      font-family:'Share Tech Mono',monospace;font-size:9px;
      letter-spacing:0.14em;text-transform:uppercase;
      color:rgba(232,232,232,0.22);
      opacity:0;transition:opacity 0.9s ease;
    }
    .mob-bl.lit{opacity:1;}

    /* bottom right: Why Not You? */
    .mob-br{
      display:none;
      position:fixed;bottom:24px;right:20px;
      z-index:20;text-align:right;
      font-family:'Share Tech Mono',monospace;font-size:9px;
      letter-spacing:0.14em;text-transform:uppercase;
      color:rgba(232,232,232,0.22);
      opacity:0;transition:opacity 0.9s ease;
    }
    .mob-br.lit{opacity:1;}

    /* classify */
    .classify{
      font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.3em;
      text-transform:uppercase;color:rgba(232,232,232,0.22);
      margin-bottom:44px;
      opacity:0;transition:opacity 0.5s ease;
      display:flex;align-items:center;gap:16px;
    }
    .classify::before,.classify::after{
      content:'';display:block;height:1px;background:rgba(232,232,232,0.2);
      width:0;transition:width 0.55s cubic-bezier(0.16,1,0.3,1);
    }
    .classify.on{opacity:1;}
    .classify.on::before,.classify.on::after{width:40px;}

    /* wordmark — centered properly, offset only on desktop */
    .wordmark{
      font-family:'Josefin Sans',sans-serif;
      font-weight:100;
      font-size:clamp(60px,10vw,130px);
      letter-spacing:0.18em;color:#E8E8E8;
      line-height:0.9;opacity:0;
      transition:opacity 0.2s;
      text-align:center;text-transform:uppercase;
    }
    .type-cursor{
      display:inline-block;width:2px;height:0.75em;
      background:#E8E8E8;vertical-align:middle;margin-left:3px;
      animation:blink 0.65s step-end infinite;
    }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* divider — centered */
    .divider{
      width:0;height:1px;background:rgba(255,255,255,0.18);
      margin:28px auto;
      transition:width 0.85s cubic-bezier(0.16,1,0.3,1);
    }
    .divider.on{width:clamp(200px,30vw,380px);}

    /* sub */
    .sub{
      font-family:'Share Tech Mono',monospace;font-size:10px;
      letter-spacing:0.1em;color:rgba(232,232,232,0);
      margin-bottom:52px;
      transition:color 0.7s ease, letter-spacing 1s cubic-bezier(0.16,1,0.3,1);
    }
    .sub.on{color:rgba(232,232,232,0.35);letter-spacing:0.32em;}

    /* enter */
    .enter-wrap{position:relative;opacity:0;transition:opacity 0.7s ease;}
    .enter-wrap.on{opacity:1;}
    #btn-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:0;}
    .enter{
      font-family:'Share Tech Mono',monospace;
      font-size:11px;letter-spacing:0.36em;text-transform:uppercase;
      color:#E8E8E8;text-decoration:none;
      padding:18px 72px;display:inline-block;
      position:relative;z-index:1;background:transparent;cursor:none;
    }

    body.out{animation:bye 0.5s forwards;}
    @keyframes bye{to{opacity:0;}}

    /* ── MOBILE ── */
    @media(max-width:768px){
      /* hide all desktop HUD */
      .hud{display:none !important;}
      /* show mobile HUD elements */
      .mob-top,.mob-bl,.mob-br{display:block;}
      /* fix cursor for touch */
      .cur{display:none;}
      body{cursor:auto;}
      /* wordmark — no offset on mobile, just centered */
      .wordmark{font-size:clamp(52px,16vw,100px);}
      /* tighten classify margin on small screens */
      .classify{margin-bottom:32px;}
      /* divider narrower on mobile */
      .divider.on{width:min(280px,70vw);}
    }
  </style>
</head>
<body>

  <div class="cur" id="cur"></div>

  <!-- Desktop HUD -->
  <div class="hud tl" id="h-tl">32°57'16"N<br>96°49'42"W<br>Dallas · TX · USA</div>
  <div class="hud tr" id="h-tr">--:--:--<br>UTC–06:00<br>Node · DFW–001</div>
  <div class="hud bl" id="h-bl">Classification: Signal<br>Access: Restricted<br>Status: Online</div>
  <div class="hud br" id="h-br">Why Not You?<br>Est. 2025<br>dfwsignal.ai</div>

  <!-- Mobile HUD -->
  <div class="mob-top" id="m-top">32°57'16"N · 96°49'42"W</div>
  <div class="mob-bl" id="m-bl">Dallas · TX</div>
  <div class="mob-br" id="m-br">Why Not You?</div>

  <div style="position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <div class="classify" id="cl">DFW Signal LLC</div>
    <div class="wordmark" id="wm"></div>
    <div class="divider" id="dv"></div>
    <div class="sub" id="sb">AI Business Solutions</div>
    <div class="enter-wrap" id="ew">
      <canvas id="btn-canvas"></canvas>
      <a class="enter" href="home.html" onclick="go(event)">Enter</a>
    </div>
  </div>

  <script>
    // cursor
    var cur=document.getElementById('cur');
    document.addEventListener('mousemove',function(e){
      cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
    });

    // clock
    function tick(){
      var t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('h-tr').innerHTML=t+'<br>UTC–06:00<br>Node · DFW–001';
    }
    tick();setInterval(tick,1000);

    // ── STEP 1: short blank pause, then typewriter ──
    setTimeout(function(){
      var el=document.getElementById('wm');
      el.style.opacity='1';
      var text='THE SIGNAL';
      var i=0;
      var cursor=document.createElement('span');
      cursor.className='type-cursor';
      el.appendChild(cursor);
      var tn=document.createElement('span');
      el.insertBefore(tn,cursor);

      function type(){
        if(i<text.length){
          tn.textContent+=text[i];i++;
          var d=85+Math.random()*60;
          if(text[i-1]===' ')d+=100;
          if(Math.random()<0.1)d+=110;
          setTimeout(type,d);
        } else {
          setTimeout(function(){cursor.remove();reveal();},500);
        }
      }
      type();
    },600);

    // ── STEP 2: reveal sequence after typing ──
    function reveal(){
      // classify lines draw out
      setTimeout(function(){
        document.getElementById('cl').classList.add('on');
      },0);

      // divider shoots across
      setTimeout(function(){
        document.getElementById('dv').classList.add('on');
      },320);

      // sub expands in
      setTimeout(function(){
        document.getElementById('sb').classList.add('on');
      },520);

      // all 4 HUD corners draw brackets then fade text — staggered slightly
      var huds=['h-tl','h-tr','h-bl','h-br'];
      huds.forEach(function(id,idx){
        setTimeout(function(){
          document.getElementById(id).classList.add('lit');
        }, 750 + idx*80);
      });

      // mobile HUD — all fade in together
      setTimeout(function(){
        ['m-top','m-bl','m-br'].forEach(function(id){
          document.getElementById(id).classList.add('lit');
        });
      }, 750);

      // enter button last
      setTimeout(function(){
        document.getElementById('ew').classList.add('on');
        setTimeout(initGlowBorder,150);
      },1200);
    }

    // ── GLOW BORDER ──
    function initGlowBorder(){
      var btn=document.querySelector('.enter');
      var bc=document.getElementById('btn-canvas');
      var bx=btn.getBoundingClientRect();
      var BW=bx.width,BH=bx.height;
      bc.width=BW;bc.height=BH;
      bc.style.width=BW+'px';bc.style.height=BH+'px';
      var bctx=bc.getContext('2d');
      var perim=2*(BW+BH);
      var prog=0,spd=perim/180;

      function pp(d){
        if(d<BW)return[d,0];d-=BW;
        if(d<BH)return[BW,d];d-=BH;
        if(d<BW)return[BW-d,BH];d-=BW;
        return[0,BH-d];
      }

      function loop(){
        bctx.clearRect(0,0,BW,BH);
        bctx.strokeStyle='rgba(232,232,232,0.14)';
        bctx.lineWidth=1;
        bctx.strokeRect(0.5,0.5,BW-1,BH-1);
        prog=(prog+spd)%perim;

        bctx.save();
        bctx.shadowColor='rgba(255,255,255,1)';
        bctx.shadowBlur=22;bctx.lineWidth=1.5;
        bctx.beginPath();
        for(var s=0;s<=32;s++){
          var d=(prog-(110*s/32)+perim)%perim;
          var pt=pp(d);
          bctx.globalAlpha=(1-s/32)*0.95;
          if(s===0){bctx.strokeStyle='rgba(255,255,255,1)';bctx.moveTo(pt[0],pt[1]);}
          else bctx.lineTo(pt[0],pt[1]);
        }
        bctx.globalAlpha=1;bctx.stroke();bctx.restore();

        var tip=pp(prog);
        bctx.save();
        bctx.shadowColor='#fff';bctx.shadowBlur=32;
        bctx.fillStyle='#fff';
        bctx.beginPath();bctx.arc(tip[0],tip[1],3,0,Math.PI*2);bctx.fill();
        bctx.restore();
        requestAnimationFrame(loop);
      }
      loop();
    }

    function go(e){
      e.preventDefault();
      document.body.classList.add('out');
      setTimeout(function(){window.location.href='home.html';},500);
    }
  </script>
</body>
</html>
